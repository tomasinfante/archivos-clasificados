<!DOCTYPE html>
<html>

<head>

<title>CLASSIFIED DATABASE</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
margin:0;
}

#terminal{
width:600px;
}

.item{
cursor:pointer;
margin:5px 0;
}

.item:hover{
text-decoration:underline;
}

.file{
margin-top:20px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div id="terminal">

<div id="path">/root</div>

<div id="files"></div>

<div id="content" class="file"></div>

</div>

<script>

let path="/";

const filesystem={

"/":[
{type:"folder",name:"archivos"},
{type:"folder",name:"notas"}
],

"/archivos":[
{type:"file",name:"creatividad.txt"},
{type:"file",name:"sorpresa.txt"},
{type:"file",name:"reflexion.txt"}
],

"/notas":[
{type:"file",name:"pista.txt"}
]

};

const files={

"creatividad.txt":
`¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque implica
interpretar información, conectar ideas y generar
conocimiento nuevo.`,

"sorpresa.txt":
`¿Por qué sorprende que sea considerado creativo?

Muchas personas creen que investigar es solo aplicar
métodos técnicos, pero formular preguntas nuevas
requiere imaginación.`,

"reflexion.txt":
`¿Tengo yo ese comportamiento?

Cuando aprendo intento no solo repetir información,
sino también conectar ideas y generar interpretaciones propias.`,

"pista.txt":
`NOTA DEL SISTEMA

Un buen investigador siempre explora más allá
de lo evidente.

A veces hay información escondida.`
};

function render(){

document.getElementById("path").innerText=path;

let container=document.getElementById("files");

container.innerHTML="";

filesystem[path].forEach(item=>{

let div=document.createElement("div");

div.className="item";

if(item.type==="folder"){

div.innerText="📁 "+item.name;

div.onclick=()=>{

path=(path=="/"?"/"+item.name:path+"/"+item.name);

render();

};

}

if(item.type==="file"){

div.innerText="📄 "+item.name;

div.onclick=()=>{

document.getElementById("content").innerText=files[item.name];

};

}

container.appendChild(div);

});

}

render();

</script>

</body>

</html>
