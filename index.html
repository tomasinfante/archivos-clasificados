<!DOCTYPE html>
<html>
<head>
<title>CLASSIFIED TERMINAL</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
padding:20px;
}

#terminal{
white-space:pre-wrap;
}

input{
background:black;
color:#00ff00;
border:none;
outline:none;
font-family:monospace;
width:80%;
}

</style>

</head>

<body>

<div id="terminal">
INITIALIZING CLASSIFIED DATABASE...

ACCESS LEVEL: RESEARCHER

type "help" to see commands

</div>

> <input id="input" autofocus>

<script>

let path="/";

const filesystem={

"/":["archivos","notas",".oculto"],

"/archivos":["creatividad.txt","sorpresa.txt","reflexion.txt"],

"/notas":["pista.txt"],

"/.oculto":["easteregg.txt"]

};

const files={

"creatividad.txt":

`PREGUNTA 1
¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque no se trata solo
de repetir información existente, sino de interpretar datos,
conectar ideas y generar conocimiento nuevo.

El proceso de investigación implica formular preguntas,
explorar posibilidades y comunicar descubrimientos.`,

"sorpresa.txt":

`PREGUNTA 2
¿Por qué sorprende que sea considerado creativo?

Muchas personas piensan que la investigación es un proceso
puramente técnico o mecánico.

Sin embargo, generar nuevas preguntas y nuevas formas
de entender el mundo requiere imaginación, pensamiento
crítico y creatividad.`,

"reflexion.txt":

`PREGUNTA 3
¿Tengo yo ese comportamiento?

Cuando aprendo o investigo intento no solo memorizar
información, sino también conectar ideas y generar
interpretaciones propias.

Este proceso refleja precisamente el aspecto creativo
de la investigación.`,

"pista.txt":

`NOTA DEL SISTEMA

Algunos archivos están ocultos.

Un investigador siempre explora más allá de lo evidente.

pista: intenta usar "ls -a"`,

"easteregg.txt":

`ARCHIVO SECRETO

Si encontraste este documento significa que
exploraste más allá de lo necesario.

Eso es exactamente lo que hace un investigador.`

};

const terminal=document.getElementById("terminal");
const input=document.getElementById("input");

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value.trim();

terminal.innerHTML+="\n> "+cmd+"\n";

process(cmd);

input.value="";

terminal.scrollTop=terminal.scrollHeight;

}

});

function process(cmd){

let parts=cmd.split(" ");

switch(parts[0]){

case "help":

terminal.innerHTML+=`
AVAILABLE COMMANDS

ls       list files
ls -a    list all files
cd       change directory
cat      open file
pwd      show current path
help     show commands
`;

break;

case "pwd":

terminal.innerHTML+=path;

break;

case "ls":

let showHidden=parts[1]=="-a";

let list=filesystem[path]||[];

if(!showHidden){

list=list.filter(f=>!f.startsWith("."));

}

terminal.innerHTML+=list.join("   ");

break;

case "cd":

let target=parts[1];

if(!target){

path="/";

break;

}

let newPath=(path=="/"?"/"+target:path+"/"+target);

if(filesystem[newPath]){

path=newPath;

}else{

terminal.innerHTML+="directory not found";

}

break;

case "cat":

let file=parts[1];

if(files[file]){

terminal.innerHTML+=files[file];

}else{

terminal.innerHTML+="file not found";

}

break;

default:

terminal.innerHTML+="command not recognized";

}

}

</script>

</body>
</html>
