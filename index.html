```html
<!DOCTYPE html>
<html>

<head>

<title>CLASSIFIED RESEARCH DATABASE</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
margin:0;

text-shadow:0 0 5px #00ff00;
font-size:18px;
}

#terminal{
width:1000px;
max-width:90vw;
}

#boot{
white-space:pre-wrap;
}

#interface{
display:none;
}

#explorer{
display:flex;
gap:40px;
margin-top:20px;
align-items:flex-start;
}

#files{
width:320px;
border-right:1px solid #00ff00;
padding-right:20px;
}

#content{
flex:1;
white-space:pre-wrap;
min-height:300px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-family:monospace;
cursor:pointer;
margin-right:10px;
padding:6px 12px;
font-size:16px;
}

button:hover{
background:#003300;
}

.item{
cursor:pointer;
margin:8px 0;
font-size:18px;
}

.item:hover{
text-decoration:underline;
}

#path{
margin:10px 0;
}

</style>

</head>

<body>

<div id="terminal">

<div id="boot"></div>

<div id="interface">

<h2>CLASSIFIED RESEARCH DATABASE</h2>

<div>
<button onclick="goBack()">⬅ volver</button>
<button onclick="goRoot()">🏠 root</button>
</div>

<div id="path"></div>

<div id="explorer">

<div id="files"></div>

<div id="content"></div>

</div>

</div>

</div>

<script>

/* BOOT SCREEN */

const bootText = `
ACCESSING CLASSIFIED DATABASE...
DECRYPTING FILES...
VERIFYING CREDENTIALS...

ACCESS GRANTED

`;

let i=0;

function boot(){

if(i < bootText.length){

document.getElementById("boot").innerHTML += bootText[i];

i++;

setTimeout(boot,25);

}
else{

document.getElementById("boot").style.display="none";

document.getElementById("interface").style.display="block";

render();

}

}

boot();


/* FILE SYSTEM */

let path="/";

const filesystem={

"/":[
{type:"folder",name:"archivos"},
{type:"folder",name:"investigacion"},
{type:"folder",name:"laboratorio"},
{type:"folder",name:"notas"},
{type:"folder",name:"easter_eggs"}
],

"/archivos":[
{type:"file",name:"creatividad.txt"},
{type:"file",name:"sorpresa.txt"},
{type:"file",name:"reflexion.txt"}
],

"/investigacion":[
{type:"file",name:"metodo.txt"},
{type:"file",name:"observacion.txt"}
],

"/laboratorio":[
{type:"file",name:"registro_01.txt"},
{type:"file",name:"registro_02.txt"}
],

"/notas":[
{type:"file",name:"pista.txt"}
],

"/easter_eggs":[
{type:"folder",name:"secreto"},
{type:"folder",name:"experimento"}
],

"/easter_eggs/secreto":[
{type:"file",name:"mensaje_oculto.txt"}
],

"/easter_eggs/experimento":[
{type:"file",name:"archivo_x.txt"}
]

};


/* FILE CONTENT */

const files={

"creatividad.txt":
`PREGUNTA 1

¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque implica interpretar información, conectar ideas y generar conocimiento nuevo.

No se trata solo de repetir datos, sino de formular preguntas y producir nuevas interpretaciones.`,

"sorpresa.txt":
`PREGUNTA 2

¿Por qué sorprende que sea considerado creativo?

Muchas personas asocian la investigación únicamente con métodos técnicos.

Sin embargo, formular nuevas preguntas y descubrir conexiones inesperadas requiere imaginación.`,

"reflexion.txt":
`PREGUNTA 3

¿Tengo yo ese comportamiento?

Cuando investigo intento no solo comprender información existente, sino también relacionar ideas y generar interpretaciones propias.`,

"metodo.txt":
`DOCUMENTO DE INVESTIGACIÓN

La creatividad aparece cuando diferentes ideas se conectan para producir nuevas explicaciones.`,

"observacion.txt":
`OBSERVACIÓN

La curiosidad es el motor fundamental de toda investigación.`,

"registro_01.txt":
`REGISTRO DE LABORATORIO

Exploración conceptual inicial.`,

"registro_02.txt":
`REGISTRO DE LABORATORIO

Resultados preliminares en análisis.`,

"pista.txt":
`NOTA DEL SISTEMA

Un buen investigador explora más allá de lo evidente.`,

"mensaje_oculto.txt":
`EASTER EGG

Si encontraste este archivo significa que exploraste más allá de lo necesario.

Eso es exactamente lo que hace un investigador.`,

"archivo_x.txt":
`ARCHIVO EXPERIMENTAL

La curiosidad es el motor de toda investigación.`

};


/* RENDER */

function render(){

document.getElementById("path").innerText="Ruta actual: "+path;

let container=document.getElementById("files");

container.innerHTML="";

filesystem[path].forEach(item=>{

let div=document.createElement("div");

div.className="item";

if(item.type==="folder"){

div.innerText="📁 "+item.name;

div.onclick=()=>{

path=(path=="/"?"/"+item.name:path+"/"+item.name);

document.getElementById("content").innerText="";

render();

};

}

if(item.type==="file"){

div.innerText="📄 "+item.name;

div.onclick=()=>{

document.getElementById("content").innerText=files[item.name];

};

}

container.appendChild(div);

});

}


/* NAVIGATION */

function goBack(){

if(path=="/") return;

let parts=path.split("/");

parts.pop();

path=parts.join("/") || "/";

document.getElementById("content").innerText="";

render();

}

function goRoot(){

path="/";

document.getElementById("content").innerText="";

render();

}

</script>

</body>

</html>
```
