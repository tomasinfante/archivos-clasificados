<!DOCTYPE html>
<html>

<head>

<title>CLASSIFIED DATABASE</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
margin:0;

text-shadow:0 0 5px #00ff00;
}

#terminal{
width:700px;
}

#boot{
font-size:18px;
white-space:pre-wrap;
}

#interface{
display:none;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-family:monospace;
cursor:pointer;
margin-right:10px;
padding:5px 10px;
}

button:hover{
background:#003300;
}

.item{
cursor:pointer;
margin:6px 0;
}

.item:hover{
text-decoration:underline;
}

.file{
margin-top:20px;
white-space:pre-wrap;
}

#path{
margin:10px 0;
}

</style>

</head>

<body>

<div id="terminal">

<div id="boot"></div>

<div id="interface">

<h3>CLASSIFIED RESEARCH DATABASE</h3>

<div>

<button onclick="goBack()">⬅ volver</button>
<button onclick="goRoot()">🏠 root</button>

</div>

<div id="path"></div>

<div id="files"></div>

<div id="content" class="file"></div>

</div>

</div>

<script>

/* ---------- BOOT SCREEN ---------- */

const bootText = `
ACCESSING CLASSIFIED DATABASE...
DECRYPTING FILES...
VERIFYING CREDENTIALS...

ACCESS GRANTED

`;

let i=0;

function boot(){

if(i < bootText.length){

document.getElementById("boot").innerHTML += bootText[i];

i++;

setTimeout(boot,30);

}
else{

document.getElementById("boot").style.display="none";

document.getElementById("interface").style.display="block";

render();

}

}

boot();


/* ---------- FILE SYSTEM ---------- */

let path="/";

const filesystem={

"/":[
{type:"folder",name:"archivos"},
{type:"folder",name:"notas"},
{type:"folder",name:"investigacion"},
{type:"folder",name:"laboratorio"},
{type:"folder",name:"easter_eggs"}
],

"/archivos":[
{type:"file",name:"creatividad.txt"},
{type:"file",name:"sorpresa.txt"},
{type:"file",name:"reflexion.txt"}
],

"/notas":[
{type:"file",name:"pista.txt"}
],

"/investigacion":[
{type:"file",name:"metodo.txt"},
{type:"file",name:"observacion.txt"}
],

"/laboratorio":[
{type:"file",name:"registro_01.txt"},
{type:"file",name:"registro_02.txt"}
],

"/easter_eggs":[
{type:"folder",name:"secreto"},
{type:"folder",name:"experimento"}
],

"/easter_eggs/secreto":[
{type:"file",name:"mensaje_oculto.txt"}
],

"/easter_eggs/experimento":[
{type:"file",name:"archivo_x.txt"}
]

};


/* ---------- FILE CONTENT ---------- */

const files={

"creatividad.txt":
`PREGUNTA 1

¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque implica
interpretar información, conectar ideas y generar
conocimiento nuevo.`,

"sorpresa.txt":
`PREGUNTA 2

¿Por qué sorprende que sea considerado creativo?

Muchas personas creen que investigar es solo aplicar
métodos técnicos, pero formular preguntas nuevas
requiere imaginación.`,

"reflexion.txt":
`PREGUNTA 3

¿Tengo yo ese comportamiento?

Cuando investigo intento conectar ideas y generar
interpretaciones propias.`,

"pista.txt":
`NOTA DEL SISTEMA

Un investigador siempre explora más allá de lo evidente.`,

"metodo.txt":
`DOCUMENTO DE INVESTIGACIÓN

La creatividad aparece cuando se combinan
ideas que antes no estaban conectadas.`,

"observacion.txt":
`OBSERVACIÓN

Investigar implica curiosidad constante.`,

"registro_01.txt":
`REGISTRO DE LABORATORIO

Experimento de exploración conceptual.`,

"registro_02.txt":
`REGISTRO DE LABORATORIO

Resultados en análisis.`,

"mensaje_oculto.txt":
`EASTER EGG

Si encontraste este archivo significa que
exploraste más allá de lo necesario.

Eso es exactamente lo que hace un investigador.`,

"archivo_x.txt":
`ARCHIVO EXPERIMENTAL

La curiosidad es el motor de toda investigación.`

};


/* ---------- RENDER ---------- */

function render(){

document.getElementById("path").innerText="Ruta actual: "+path;

let container=document.getElementById("files");

container.innerHTML="";

filesystem[path].forEach(item=>{

let div=document.createElement("div");

div.className="item";

if(item.type==="folder"){

div.innerText="📁 "+item.name;

div.onclick=()=>{

path=(path=="/"?"/"+item.name:path+"/"+item.name);

document.getElementById("content").innerText="";

render();

};

}

if(item.type==="file"){

div.innerText="📄 "+item.name;

div.onclick=()=>{

document.getElementById("content").innerText=files[item.name];

};

}

container.appendChild(div);

});

}


/* ---------- NAVIGATION ---------- */

function goBack(){

if(path=="/") return;

let parts=path.split("/");

parts.pop();

path=parts.join("/") || "/";

document.getElementById("content").innerText="";

render();

}

function goRoot(){

path="/";

document.getElementById("content").innerText="";

render();

}

</script>

</body>
</html>
