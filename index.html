<!DOCTYPE html>
<html>

<head>

<title>CLASSIFIED RESEARCH DATABASE</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-shadow:0 0 5px #00ff00;
font-size:18px;
}

#terminal{
width:1000px;
max-width:90vw;
}

#boot{
white-space:pre-wrap;
}

#interface{
display:none;
}

#explorer{
display:flex;
gap:40px;
margin-top:20px;
align-items:flex-start;
}

#files{
width:320px;
border-right:1px solid #00ff00;
padding-right:20px;
}

#content{
flex:1;
white-space:pre-wrap;
min-height:320px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-family:monospace;
cursor:pointer;
margin-right:10px;
padding:6px 12px;
font-size:16px;
}

button:hover{
background:#003300;
}

.item{
cursor:pointer;
margin:8px 0;
font-size:18px;
}

.item:hover{
text-decoration:underline;
}

.secret{
color:#ff5555;
font-weight:bold;
text-shadow:0 0 4px #ff0000;
}

#path{
margin:10px 0;
}

</style>

</head>

<body>

<div id="terminal">

<div id="boot"></div>

<div id="interface">

<h2>CLASSIFIED RESEARCH DATABASE</h2>

<div>
<button onclick="goBack()">⬅ volver</button>
<button onclick="goRoot()">🏠 root</button>
</div>

<div id="path"></div>

<div id="explorer">
<div id="files"></div>
<div id="content"></div>
</div>

</div>

</div>

<script>

/* BOOT SCREEN */

const bootText = `
ACCESSING CLASSIFIED DATABASE...
DECRYPTING FILES...
VERIFYING CREDENTIALS...

ACCESS GRANTED
`;

let i=0;

function boot(){

if(i < bootText.length){

document.getElementById("boot").innerHTML += bootText[i];
i++;
setTimeout(boot,25);

}
else{

document.getElementById("boot").style.display="none";
document.getElementById("interface").style.display="block";
render();

}

}

boot();


/* FILE SYSTEM */

let path="/";

const filesystem={

"/":[
{type:"folder",name:"archivos"},
{type:"folder",name:"investigacion"},
{type:"folder",name:"laboratorio"},
{type:"folder",name:"notas"},
{type:"folder",name:"top_secret"}
],

"/archivos":[
{type:"file",name:"creatividad.txt"},
{type:"file",name:"sorpresa.txt"},
{type:"file",name:"reflexion.txt"}
],

"/investigacion":[
{type:"file",name:"metodo.txt"},
{type:"file",name:"observacion.txt"}
],

"/laboratorio":[
{type:"file",name:"registro_01.txt"},
{type:"file",name:"registro_02.txt"}
],

"/notas":[
{type:"file",name:"pista.txt"}
],

"/top_secret":[
{type:"folder",name:"area_51"},
{type:"folder",name:"mk_ultra"},
{type:"folder",name:"roswell"},
{type:"folder",name:"manhattan_project"}
],

"/top_secret/area_51":[
{type:"file",name:"informacion.txt"}
],

"/top_secret/mk_ultra":[
{type:"file",name:"documento.txt"}
],

"/top_secret/roswell":[
{type:"file",name:"incidente.txt"}
],

"/top_secret/manhattan_project":[
{type:"file",name:"informe.txt"}
]

};


/* FILE CONTENT */

const files={

"creatividad.txt":
`PREGUNTA 1

¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque no consiste
solo en aplicar un método o seguir una serie de pasos
predefinidos.

Durante el proceso el investigador debe interpretar
información, relacionar conceptos provenientes de
distintas fuentes y construir una explicación coherente
a partir de ellos.

Para lograrlo intervienen distintos procesos cognitivos.

La memoria permite recuperar conocimientos previos,
teorías y lecturas anteriores que sirven como base
para interpretar la nueva información.

La atención permite seleccionar qué elementos de toda
la información disponible son relevantes para el
problema que se está investigando.

El control cognitivo permite evaluar distintas
interpretaciones posibles, descartar las menos
consistentes y organizar las ideas de manera lógica.`,

"sorpresa.txt":
`PREGUNTA 2

¿Por qué sorprendió que fuera considerado creativo?

Resulta sorprendente porque muchas veces la investigación
se percibe como un proceso técnico o mecánico.

Sin embargo, al analizar el proceso completo se observa
que formular preguntas, elegir interpretaciones y
relacionar conceptos requiere imaginación y pensamiento
crítico.

Por eso puede considerarse una forma de creatividad
intelectual.`,

"reflexion.txt":
`PREGUNTA 3

PREGUNTA 3

¿Tengo yo ese comportamiento?

Gran parte de mi carrera está orientada a investigar 
y eventualmente publicar resultados. Sin embargo, 
siempre entendí ese proceso principalmente como una 
actividad metodológica: formular un problema, aplicar 
un método y analizar resultados.

Por esta razón nunca había pensado la investigación
como una actividad particularmente creativa.

Pero, luego de analizarlo, resulta evidente que 
investigar también implica interpretar información, 
seleccionar qué ideas son relevantes y conectar 
conceptos provenientes de distintas fuentes.

En ese sentido, reconozco que sí he tenido ese
comportamiento durante mi propio proceso de trabajo, 
aunque anteriormente no lo identificaba
como una forma de creatividad.`,

"metodo.txt":
`DOCUMENTO DE INVESTIGACIÓN

La creatividad aparece cuando distintas ideas
se conectan para generar nuevas explicaciones.`,

"observacion.txt":
`OBSERVACIÓN

Los primeros algoritmos no fueron escritos
para computadores electrónicos.

Fueron imaginados por Ada Lovelace.`,

"registro_01.txt":
`REGISTRO DE LABORATORIO

Exploración conceptual inicial.`,

"registro_02.txt":
`REGISTRO DE LABORATORIO

Resultados preliminares.`,

"pista.txt":
`NOTA DEL SISTEMA

Ada Lovelace es considerada una de las primeras personas
en imaginar cómo una máquina podría ejecutar algoritmos,
mucho antes de la existencia de los computadores modernos.

Muchos historiadores la consideran la primera programadora.

Para acceder al archivo clasificado
introduce el año de nacimiento de Ada Lovelace.`,

"informacion.txt":
`AREA 51

Instalación militar en Nevada asociada a pruebas
experimentales de aeronaves.

Muchos documentos siguen clasificados.

Proyecto identificado como ███████████.`,

"documento.txt":
`MK ULTRA

Programa real de la CIA iniciado en los años 50
para investigar técnicas de control mental.

Gran parte de los documentos fueron destruidos en 1973.

Sujetos experimentales: █████████.`,

"incidente.txt":
`INCIDENTE DE ROSWELL – 1947

Un objeto desconocido se estrelló en Nuevo México.

El ejército declaró inicialmente haber recuperado
un "disco volador".

La explicación oficial posterior fue
un globo del proyecto █████.`,

"informe.txt":
`MANHATTAN PROJECT

Proyecto secreto de EE.UU. durante la Segunda Guerra Mundial
para desarrollar la primera bomba atómica.

Director científico: J. Robert Oppenheimer.

Localización principal: Los Álamos.

Partes del proyecto siguen clasificadas █████.`

};


/* RENDER */

function render(){

document.getElementById("path").innerText="Ruta actual: "+path;

let container=document.getElementById("files");

container.innerHTML="";

filesystem[path].forEach(item=>{

let div=document.createElement("div");

div.className="item";

if(item.name==="top_secret"){
div.classList.add("secret");
div.innerText="🔒 "+item.name;
}

else if(item.type==="folder"){
div.innerText="📁 "+item.name;
}

if(item.type==="folder"){

div.onclick=()=>{

if(item.name==="top_secret"){

let pass=prompt("ACCESS RESTRICTED\nEnter password:");

if(pass!=="1815"){
alert("ACCESS DENIED\nHint: revisa la carpeta NOTAS.");
return;
}

}

path=(path=="/"?"/"+item.name:path+"/"+item.name);

document.getElementById("content").innerText="";

render();

};

}

if(item.type==="file"){

div.innerText="📄 "+item.name;

div.onclick=()=>{
document.getElementById("content").innerText=files[item.name];
};

}

container.appendChild(div);

});

}


/* NAVIGATION */

function goBack(){

if(path=="/") return;

let parts=path.split("/");

parts.pop();

path=parts.join("/") || "/";

document.getElementById("content").innerText="";

render();

}

function goRoot(){

path="/";

document.getElementById("content").innerText="";

render();

}

</script>

</body>

</html>
