<!DOCTYPE html>
<html>

<head>

<title>CLASSIFIED RESEARCH DATABASE</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-shadow:0 0 5px #00ff00;
font-size:18px;
}

#terminal{
width:1000px;
max-width:90vw;
}

#boot{
white-space:pre-wrap;
}

#interface{
display:none;
}

#explorer{
display:flex;
gap:40px;
margin-top:20px;
align-items:flex-start;
}

#files{
width:320px;
border-right:1px solid #00ff00;
padding-right:20px;
}

#content{
flex:1;
white-space:pre-wrap;
min-height:320px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-family:monospace;
cursor:pointer;
margin-right:10px;
padding:6px 12px;
font-size:16px;
}

button:hover{
background:#003300;
}

.item{
cursor:pointer;
margin:8px 0;
font-size:18px;
}

.item:hover{
text-decoration:underline;
}

.secret{
color:#ff5555;
font-weight:bold;
text-shadow:0 0 4px #ff0000;
}

#path{
margin:10px 0;
}

</style>

</head>

<body>

<div id="terminal">

<div id="boot"></div>

<div id="interface">

<h2>CLASSIFIED RESEARCH DATABASE</h2>

<div>
<button onclick="goBack()">⬅ volver</button>
<button onclick="goRoot()">🏠 root</button>
</div>

<div id="path"></div>

<div id="explorer">
<div id="files"></div>
<div id="content"></div>
</div>

</div>

</div>

<script>

/* BOOT SCREEN */

const bootText = `
ACCESSING CLASSIFIED DATABASE...
DECRYPTING FILES...
VERIFYING CREDENTIALS...

ACCESS GRANTED
`;

let i=0;

function boot(){

if(i < bootText.length){

document.getElementById("boot").innerHTML += bootText[i];
i++;
setTimeout(boot,25);

}
else{

document.getElementById("boot").style.display="none";
document.getElementById("interface").style.display="block";
render();

}

}

boot();


/* FILE SYSTEM */

let path="/";

const filesystem={

"/":[
{type:"folder",name:"analisis"},
{type:"folder",name:"investigacion"},
{type:"folder",name:"laboratorio"},
{type:"folder",name:"notas"},
{type:"folder",name:"top_secret"}
],

"/analisis":[
{type:"file",name:"creatividad.txt"},
{type:"file",name:"sorpresa.txt"},
{type:"file",name:"reflexion.txt"}
],

"/investigacion":[
{type:"file",name:"metodo.txt"}
],

"/laboratorio":[
{type:"pdf",label:"Clase 2 — Mitos de la creatividad",name:"Clase_2_Mitos_Creatividad.pdf"},
{type:"pdf",label:"Clase 3 — La mente creativa",name:"Clase_3_La_Mente_Creativa.pdf"},
{type:"pdf",label:"Clase 4 — Creatividad en la vida diaria",name:"Clase_4_Creatividad_En_La_Vida_Diaria.pdf"},
{type:"pdf",label:"Clase 5 — ADN del innovador",name:"Clase_5_ADN_Del_Innovador.pdf"}
],

"/notas":[
{type:"file",name:"pista.txt"}
],

"/top_secret":[
{type:"folder",name:"area_51"},
{type:"folder",name:"mk_ultra"},
{type:"folder",name:"roswell"},
{type:"folder",name:"manhattan_project"}
],

"/top_secret/area_51":[
{type:"file",name:"informacion.txt"}
],

"/top_secret/mk_ultra":[
{type:"file",name:"documento.txt"}
],

"/top_secret/roswell":[
{type:"file",name:"incidente.txt"}
],

"/top_secret/manhattan_project":[
{type:"file",name:"informe.txt"}
]

};


/* FILE CONTENT */

const files={

"creatividad.txt":
`PREGUNTA 1

¿Qué hace creativo publicar una investigación?

Publicar una investigación es creativo porque no consiste
solo en aplicar un método.

Durante el proceso el investigador debe interpretar
información, relacionar conceptos y construir una
explicación coherente.

En este proceso intervienen memoria, atención
y control cognitivo.

La memoria permite recuperar teorías y conocimientos previos.

La atención permite seleccionar qué elementos son relevantes.

El control cognitivo permite evaluar interpretaciones
y organizar las ideas.`,

"sorpresa.txt":
`PREGUNTA 2

¿Por qué sorprendió que fuera considerado creativo?

Muchas veces la investigación se percibe como
un proceso técnico o mecánico.

Sin embargo, formular preguntas, elegir
interpretaciones y relacionar conceptos
requiere imaginación y pensamiento crítico.

Por eso puede considerarse una forma de
creatividad intelectual.`,

"reflexion.txt":
`PREGUNTA 3

¿Tengo yo ese comportamiento?

Gran parte de mi formación académica se orienta
hacia la investigación y la posible publicación
de resultados.

Durante mucho tiempo entendí ese proceso como
una actividad principalmente metodológica.

Sin embargo, al analizarlo con mayor detalle
resulta evidente que investigar también implica
interpretar datos, conectar ideas y construir
explicaciones nuevas.

En ese sentido reconozco que sí he tenido ese
comportamiento durante mi propio trabajo,
aunque anteriormente no lo identificaba
como una forma de creatividad.`,

"metodo.txt":
`DOCUMENTO METODOLÓGICO

En el proceso de publicar una investigación
muchas veces es necesario distanciarse de
las percepciones iniciales.

El investigador debe enfrentarse a los datos
o ecuaciones tal como aparecen.

Este distanciamiento obliga a replantear
interpretaciones previas.

Paradójicamente este proceso puede abrir
espacios para la creatividad al exigir
nuevas formas de comprender los resultados.`,

"pista.txt":
`NOTA DEL SISTEMA

Ada Lovelace fue una de las primeras personas
en imaginar cómo una máquina podía ejecutar
algoritmos.

Muchos historiadores la consideran la primera
programadora.

Para acceder a los archivos clasificados
introduce el año de nacimiento de Ada Lovelace.`,

"informacion.txt":
`AREA 51 — ARCHIVO DESCLASIFICADO (PARCIAL)

Ubicación: Nevada Test and Training Range, EE.UU.

Area 51 es una instalación militar utilizada para
desarrollo y pruebas de aeronaves experimentales.

Diversos programas clasificados fueron evaluados aquí,
incluyendo prototipos de aeronaves de reconocimiento
de alta altitud y tecnologías de sigilo.

Entre los programas asociados se mencionan:

• Proyecto U-2 (reconocimiento estratégico)
• A-12 OXCART
• Desarrollo inicial de tecnologías stealth

Gran parte de la información sobre operaciones
específicas permanece clasificada.

Proyectos relacionados:
████████████████████
████████████████████
████████████████████

Documentos técnicos archivados bajo
clasificación ███████████.`,

"documento.txt":
`MK ULTRA — PROGRAMA CLASIFICADO

Periodo: 1953–1973
Agencia responsable: CIA

MK Ultra fue un programa real de investigación
destinado a estudiar técnicas de control mental
y manipulación psicológica durante la Guerra Fría.

Los experimentos incluyeron el uso de sustancias
psicoactivas, hipnosis y métodos de interrogación.

Muchos sujetos no sabían que estaban participando
en experimentos.

En 1973 gran parte de los archivos fueron
intencionalmente destruidos por orden de
██████████████████.

Investigadores involucrados:
██████████████████
██████████████████

Proyectos derivados:
• Subproject ███
• Subproject ████
• Subproject ███████

Estado de los archivos: PARCIALMENTE DESTRUIDOS.`,

"incidente.txt":
`INCIDENTE DE ROSWELL — INFORME PARCIAL

Fecha: Julio de 1947
Ubicación: Roswell, Nuevo México.

Un objeto aéreo desconocido fue recuperado
por personal militar estadounidense.

El comunicado inicial del ejército describía
el hallazgo como un "disco volador".

Posteriormente la explicación oficial cambió
indicando que se trataba de un globo meteorológico
perteneciente al Proyecto Mogul.

Sin embargo diversos documentos posteriores
indican la participación de unidades de
recuperación especial.

Material recuperado:
████████████████████
████████████████████

Equipo científico asignado:
████████████████████

Clasificación del incidente:
ARCHIVO PARCIALMENTE CENSURADO.`,

"informe.txt":
`MANHATTAN PROJECT — ARCHIVO HISTÓRICO

Periodo: 1942–1946

El Manhattan Project fue el programa secreto
de investigación y desarrollo que produjo
las primeras armas nucleares.

El proyecto involucró a más de 130.000 personas
y múltiples centros de investigación.

Principales instalaciones:

• Los Álamos Laboratory
• Oak Ridge
• Hanford Site

Director científico:
J. Robert Oppenheimer

Participación científica adicional:
Enrico Fermi
Richard Feynman
Niels Bohr

Partes significativas del programa,
incluyendo ciertos procedimientos técnicos
y estudios posteriores, permanecen bajo
clasificación.

Secciones restringidas:
████████████████████
████████████████████
████████████████████

Nivel de acceso requerido:
████████████.`

};


/* RENDER */

function render(){

document.getElementById("path").innerText="Ruta actual: "+path;

let container=document.getElementById("files");
container.innerHTML="";

filesystem[path].forEach(item=>{

let div=document.createElement("div");
div.className="item";

if(item.name==="top_secret"){
div.classList.add("secret");
div.innerText="🔒 "+item.name;
}

else if(item.type==="folder"){
div.innerText="📁 "+item.name;
}

if(item.type==="folder"){

div.onclick=()=>{

if(item.name==="top_secret"){

let pass=prompt("ACCESS RESTRICTED\nEnter password:");

if(pass!=="1815"){
alert("ACCESS DENIED\nHint: revisa la carpeta NOTAS.");
return;
}

}

path=(path=="/"?"/"+item.name:path+"/"+item.name);
document.getElementById("content").innerText="";
render();

};

}

if(item.type==="file"){

div.innerText="📄 "+item.name;

div.onclick=()=>{
document.getElementById("content").innerText=files[item.name];
};

}

if(item.type==="pdf"){

div.innerText="📑 "+item.label;

div.onclick=()=>{
window.open(item.name,"_blank");
};

}

container.appendChild(div);

});

}


/* NAVIGATION */

function goBack(){

if(path=="/") return;

let parts=path.split("/");
parts.pop();

path=parts.join("/") || "/";

document.getElementById("content").innerText="";
render();

}

function goRoot(){

path="/";
document.getElementById("content").innerText="";
render();

}

</script>

</body>
</html>
